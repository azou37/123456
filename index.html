<!DOCTYPE html>
<html>
  <head>
    <title>My experiment</title>
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />
  </head>
  <body></body>
  <script>

    var jsPsych = initJsPsych({
      on_finish: function() {
        jsPsych.data.displayData();
      }
    });

    var timeline = [];

    var welcome = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "Welcome to the experiment. Press any key to begin."
    };
    timeline.push(welcome);
    
    var instructions = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <p>In this experiment, a letter string will appear in the center of the screen.</p>
        <p>If the letter string is <strong>real English word</strong>, press the  <strong>F</strong> on the keyboard as fast as you can.</p>
        <p>If the letter string is <strong>non-English word</strong>, press the <strong>J</strong> as fast as you can.</p>
        <div style='float: left;'><img src='img/blue.png'>
        <p>Please respond as quickly and accurately as possible.</p>
        <p><strong>F = Real Word</strong></p>
        <p><strong>J = Not a Real Word</strong></p>
        <p>Press any key to begin.</p>
      `,
      post_trial_gap: 2000
    };
    timeline.push(instructions);

    var test_stimuli = [
      { stimulus: "house", correct_response: 'f', lexicality: "word", frequency: "high" },
      { stimulus: "water", correct_response: 'f', lexicality: "word", frequency: "high" },
      { stimulus: "island", correct_response: 'f', lexicality: "word", frequency: "low" },
      { stimulus: "lantern", correct_response: 'f', lexicality: "word", frequency: "low" },
      { stimulus: "blark", correct_response: 'j', lexicality: "nonword", frequency: "none" },
      { stimulus: "trudle", correct_response: 'j', lexicality: "nonword", frequency: "none" }
    ];

    var fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="font-size:60px;">+</div>',
      choices: "NO_KEYS",
      trial_duration: function(){
        return jsPsych.randomization.sampleWithoutReplacement([250, 500, 750, 1000], 1)[0];
      },
      data: {
        task: 'fixation'
      }
    };
   
    var test = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: jsPsych.timelineVariable('stimulus'),
      choices: ['f', 'j'],
      data: {
        task: 'response',
        correct_response: jsPsych.timelineVariable('correct_response'),
        lexicality: jsPsych.timelineVariable('lexicality'),
        frequency: jsPsych.timelineVariable('frequency')
      },
      on_finish: function(data){
        data.correct = data.response == data.correct_response;
      }
    };
    
    var test_procedure = {
      timeline: [fixation, test],
      timeline_variables: test_stimuli,
      randomize_order: true,
      repetitions: 5
    };
  
    timeline.push(test_procedure);

    var debrief_block = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {

        var trials = jsPsych.data.get().filter({task: 'response'});
        var correct_trials = trials.filter({correct: true});
        var accuracy = Math.round(correct_trials.count() / trials.count() * 100);
        var rt = Math.round(correct_trials.select('rt').mean());

        return `<p>You responded correctly on ${accuracy}% of the trials.</p>
          <p>Your average response time was ${rt}ms.</p>
          <p>Press any key to complete the experiment. Thank you!</p>`;

      }
    };
    timeline.push(debrief_block);

    jsPsych.run(timeline);

  </script>
</html>
